name: Sync docs manifest to slope-web

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Generate manifest
        run: node dist/cli/index.js docs generate --pretty --stdout > docs-manifest.json

      - name: Validate manifest
        run: node -e "const m = JSON.parse(require('fs').readFileSync('docs-manifest.json','utf8')); if (!m.commands || !m.guards || !m.mcpTools) { console.error('Invalid manifest'); process.exit(1); } console.log('Manifest valid:', m.commands.length, 'commands,', m.guards.length, 'guards,', m.mcpTools.length, 'MCP tools');"

      - name: Compute stats
        run: node dist/cli/index.js stats export --pretty > stats.json

      - name: Validate stats
        run: node -e "const s = JSON.parse(require('fs').readFileSync('stats.json','utf8')); if (!s.sprints_completed || !s.handicap) { console.error('Invalid stats'); process.exit(1); } console.log('Stats valid:', s.sprints_completed, 'sprints,', s.cli_commands, 'commands');"

      - name: Publish stats to KV
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler kv key put --namespace-id=${{ secrets.SLOPE_STATS_KV_NS_ID }} "stats" --path=stats.json --remote

      - name: Checkout slope-web
        uses: actions/checkout@v4
        with:
          repository: srbryers/slope-web
          token: ${{ secrets.SLOPE_WEB_PAT }}
          path: slope-web

      - name: Copy manifest
        run: cp docs-manifest.json slope-web/src/data/docs-manifest.json

      # SLOPE_WEB_PAT requires repo scope (read/write) on srbryers/slope-web
      # to checkout, push commits, and create pull requests.
      - name: Create PR on slope-web
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SLOPE_WEB_PAT }}
          path: slope-web
          base: main
          commit-message: "chore: update docs manifest from slope ${{ github.event.release.tag_name || 'manual' }}"
          title: "chore: update docs manifest from slope ${{ github.event.release.tag_name || 'manual' }}"
          body: |
            Automated manifest sync from [slope release](${{ github.event.release.html_url || format('{0}/{1}', github.server_url, github.repository) }}).

            Updates `src/data/docs-manifest.json` with the latest CLI commands, guards, MCP tools, metaphors, and changelog.

            Generated by the `sync-docs` workflow.
          branch: chore/docs-manifest-sync
          delete-branch: true
