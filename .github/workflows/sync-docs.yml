name: Sync docs manifest to slope-web

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate manifest
        run: node dist/cli/index.js docs generate --pretty --stdout > docs-manifest.json

      - name: Checkout slope-web
        uses: actions/checkout@v4
        with:
          repository: srbryers/slope-web
          token: ${{ secrets.SLOPE_WEB_PAT }}
          path: slope-web

      - name: Copy manifest
        run: cp docs-manifest.json slope-web/src/data/docs-manifest.json

      - name: Create PR on slope-web
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SLOPE_WEB_PAT }}
          path: slope-web
          commit-message: "chore: update docs manifest from slope ${{ github.event.release.tag_name || 'manual' }}"
          title: "chore: update docs manifest from slope ${{ github.event.release.tag_name || 'manual' }}"
          body: |
            Automated manifest sync from [slope release](${{ github.event.release.html_url || github.server_url + '/' + github.repository }}).

            Updates `src/data/docs-manifest.json` with the latest CLI commands, guards, MCP tools, metaphors, and changelog.

            Generated by the `sync-docs` workflow.
          branch: chore/docs-manifest-sync
          delete-branch: true
